display_information:
  name: SEEMORE Vehicle Thread Linker
  description: 車体番号の完全一致で車案件スレッドを紐付けるGAS連携Bot
  background_color: "#1f2937"
features:
  bot_user:
    display_name: SEEMORE車案件リンク
    always_online: false
oauth_config:
  scopes:
    bot:
      - channels:read
      - channels:history
      - groups:read
      - groups:history
      - chat:write
      - search:read
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
